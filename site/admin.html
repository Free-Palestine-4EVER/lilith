<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>LILITH · Atelier — Orders</title>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="stylesheet" href="fonts.css?v=20" />
<style>
  :root{--ink:#1a120e;--mut:#7a6f64;--line:#e7ded7;--blood:#7c1d2c;--blood2:#a32a3e}
  *{margin:0;box-sizing:border-box}
  body{font-family:'Supreme','Helvetica Neue',sans-serif;background:#f7f4f0;color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:980px;margin:0 auto;padding:clamp(28px,5vw,60px) clamp(20px,4vw,40px)}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:34px;border-bottom:1px solid var(--line);padding-bottom:18px}
  .brand{font-family:'Melodrama',serif;font-weight:500;font-size:30px;letter-spacing:.18em}
  .brand small{display:block;font-family:'Supreme';font-size:10px;letter-spacing:.34em;text-transform:uppercase;color:var(--blood2);margin-top:4px}
  .who{font-size:13px;color:var(--mut)}
  .who button{background:none;border:none;color:var(--blood2);cursor:pointer;font:inherit;text-decoration:underline;margin-left:10px}
  /* login */
  .login{max-width:380px;margin:8vh auto;display:flex;flex-direction:column;gap:16px;text-align:center}
  .login h1{font-family:'Melodrama',serif;font-weight:500;font-size:40px}
  .login p{color:var(--mut);font-size:14px}
  .field{display:flex;flex-direction:column;gap:7px;text-align:left}
  .field span{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut)}
  .field input{border:1px solid var(--line);border-radius:8px;padding:12px 13px;font:inherit;font-size:15px;outline:none}
  .field input:focus{border-color:var(--blood2);box-shadow:0 0 0 3px rgba(163,42,62,.18)}
  .btn{background:var(--blood);color:#fff;border:none;border-radius:8px;padding:14px;cursor:pointer;font-size:12px;letter-spacing:.2em;text-transform:uppercase;transition:.25s}
  .btn:hover{background:var(--blood2)}
  .err{color:#c2334a;font-size:13px;min-height:1px}
  /* orders */
  .tools{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .tools .count{color:var(--mut);font-size:13px}
  .tools button{background:none;border:1px solid var(--line);border-radius:6px;padding:8px 14px;font:inherit;font-size:12px;cursor:pointer;color:var(--ink)}
  .order{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-bottom:14px;display:grid;grid-template-columns:1fr auto;gap:10px 20px;align-items:center}
  .o-main h3{font-family:'Melodrama',serif;font-weight:500;font-size:21px}
  .o-meta{color:var(--mut);font-size:13px;margin-top:4px;line-height:1.6}
  .o-meta b{color:var(--ink);font-weight:500}
  .o-status{display:flex;flex-direction:column;gap:7px;align-items:flex-end}
  .o-status label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut)}
  .o-status select{border:1px solid var(--line);border-radius:8px;padding:10px 12px;font:inherit;font-size:14px;cursor:pointer;background:#fff;min-width:160px}
  .o-status select:focus{outline:none;border-color:var(--blood2)}
  .o-status .saved{font-size:11px;color:#2e7d56;opacity:0;transition:opacity .3s}
  .o-status .saved.show{opacity:1}
  .empty{color:var(--mut);text-align:center;padding:50px 0}
  @media(max-width:560px){.order{grid-template-columns:1fr}.o-status{align-items:flex-start}}
</style>
</head>
<body>
  <div class="wrap">
    <!-- LOGIN -->
    <div class="login" id="loginView">
      <h1>Atelier</h1>
      <p>Sign in with the LILITH admin account to manage reservations.</p>
      <form id="loginForm">
        <div class="field"><span>Email</span><input type="email" id="email" autocomplete="email" /></div>
        <div class="field" style="margin-top:14px"><span>Password</span><input type="password" id="pass" autocomplete="current-password" /></div>
        <p class="err" id="err"></p>
        <button class="btn" type="submit" style="margin-top:14px;width:100%">Sign in</button>
      </form>
    </div>

    <!-- DASHBOARD -->
    <div id="dash" style="display:none">
      <header>
        <div class="brand">LILITH<small>Atelier · Orders</small></div>
        <div class="who"><span id="whoEmail"></span><button id="logout">Sign out</button></div>
      </header>
      <div class="tools">
        <span class="count" id="count"></span>
        <button id="refresh">Refresh</button>
      </div>
      <div id="orders"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js?v=33"></script>
  <script>
  (function(){
    const ADMIN = 'zzeidnaser@gmail.com';
    const STAGES = [['reserved','Reserved'],['invoiced','Invoiced'],['designing','In design'],['designed','Designed'],['production','In production'],['shipped','Shipped'],['arrived','Arrived']];
    const $ = id => document.getElementById(id);
    const esc = s => String(s==null?'':s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    const auth = window.lilithAuth, db = window.lilithDB;

    $('loginForm').addEventListener('submit', async e=>{
      e.preventDefault(); $('err').textContent='';
      try{ await auth.signInWithEmailAndPassword($('email').value.trim(), $('pass').value); }
      catch(err){ $('err').textContent = (err.code||'').includes('invalid')||(err.code||'').includes('wrong')?'Wrong email or password.':(err.message||'Sign-in failed.'); }
    });
    $('logout').addEventListener('click', ()=> auth.signOut());
    $('refresh').addEventListener('click', loadOrders);

    auth.onAuthStateChanged(u=>{
      if(u && u.email === ADMIN){
        $('loginView').style.display='none'; $('dash').style.display='block';
        $('whoEmail').textContent = u.email; loadOrders();
      } else {
        $('dash').style.display='none'; $('loginView').style.display='block';
        if(u && u.email !== ADMIN){ $('err').textContent = 'That account is not an admin.'; auth.signOut(); }
      }
    });

    async function loadOrders(){
      const box = $('orders'); box.innerHTML = '<p class="empty">Loading…</p>';
      try{
        const snap = await db.collection('orders').get();
        const docs = snap.docs.slice().sort((a,b)=>((b.data().createdAt&&b.data().createdAt.seconds)||0)-((a.data().createdAt&&a.data().createdAt.seconds)||0));
        $('count').textContent = docs.length + ' reservation' + (docs.length===1?'':'s');
        if(!docs.length){ box.innerHTML = '<p class="empty">No reservations yet.</p>'; return; }
        box.innerHTML = '';
        docs.forEach(doc=>{
          const o = doc.data();
          const when = o.createdAt && o.createdAt.toDate ? o.createdAt.toDate().toLocaleDateString() : '';
          const opts = STAGES.map(s=>`<option value="${s[0]}"${(o.status||'reserved')===s[0]?' selected':''}>${s[1]}</option>`).join('');
          const el = document.createElement('div'); el.className='order';
          el.innerHTML = `<div class="o-main">
              <h3>${esc(o.product||'LILITH piece')}</h3>
              <p class="o-meta"><b>${esc(o.orderNo||'')}</b> · ${esc(o.summary||'')}${o.price?(' · '+esc(o.price)):''}<br>
              ${esc(o.name||'')} · <b>${esc(o.email||'')}</b>${when?(' · '+esc(when)):''}</p>
            </div>
            <div class="o-status"><label>Status</label>
              <select>${opts}</select><span class="saved">Saved ✓</span></div>`;
          const sel = el.querySelector('select'), saved = el.querySelector('.saved');
          sel.addEventListener('change', async ()=>{
            sel.disabled = true;
            try{ await db.collection('orders').doc(doc.id).update({ status: sel.value });
              saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 1600);
            }catch(err){ alert('Could not update: '+(err.message||err)); }
            finally{ sel.disabled = false; }
          });
          box.appendChild(el);
        });
      }catch(err){ box.innerHTML = '<p class="empty">Could not load orders. '+esc(err.message||'')+'</p>'; }
    }
  })();
  </script>
</body>
</html>
